<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? - 저녁 메뉴 추천</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-controls">
        <a href="pet-classifier.html" class="control-btn">🐶 강아지/고양이 AI 판별기</a>
        <button id="lang-btn" class="control-btn">English</button>
        <button id="theme-btn" class="control-btn">다크 모드</button>
    </div>

    <div class="app-container">
        <header>
            <h1 id="main-title">🍴 오늘 뭐 먹지?</h1>
            <p id="main-subtitle">결정 장애를 위한 저녁 메뉴 추천 서비스</p>
        </header>

        <main>
            <div id="result-container" class="result-card">
                <div class="icon" id="menu-icon">❓</div>
                <h2 id="menu-name">메뉴를 추천해 드릴까요?</h2>
                <p id="menu-desc">버튼을 눌러 저녁 메뉴를 정해 보세요!</p>
            </div>

            <button id="recommend-btn">오늘의 메뉴 추천받기!</button>
        </main>

        <section class="contact-section">
            <h3 id="contact-title">🤝 제휴 문의</h3>
            <form action="https://formspree.io/f/xykdowjz" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="email" id="label-email">이메일 주소</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message" id="label-message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의 내용을 입력해 주세요." required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="contact-submit">문의 보내기</button>
            </form>
        </section>

        <section id="comments">
            <div id="disqus_thread"></div>
            <script>
                (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-ziactbiox2.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>

        <footer>
            <p id="footer-text">&copy; 2026 저녁 메뉴 추천기</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
