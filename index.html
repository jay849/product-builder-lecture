                Your email:
                <input type="email" name="email" placeholder="email@example.com" required>

            <label>
                Your message:
                <textarea name="message" rows="4" placeholder="문의 내용을 입력해주세요." required></textarea>
            </label>
            <button type="submit">Send</button>
        </form>
