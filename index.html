<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Helper - 스마트 일상 도구</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-1134948203088944">

     crossorigin="anonymous"></script>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🌟 Life Helper</a>
            <div class="nav-links">
                <a href="index.html" class="active">메뉴 추천</a>
                <a href="pet-classifier.html">AI 판별</a>
                <a href="about.html">소개</a>
                <button id="theme-btn" class="theme-toggle">🌙</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="section-card">
            <h1>🍴 오늘 뭐 먹지?</h1>
            <p>메뉴 결정을 도와드리는 스마트 추천 서비스입니다.</p>
            
            <div id="result-container" class="result-card">
                <div class="icon" id="menu-icon" style="font-size: 4rem; margin-bottom: 1rem;">❓</div>
                <h2 id="menu-name">메뉴를 추천해 드릴까요?</h2>
                <p id="menu-desc" style="margin-bottom: 0;">버튼을 누르면 오늘의 추천 메뉴가 나타납니다.</p>
            </div>
            <button id="recommend-btn">오늘의 추천 메뉴 확인하기</button>
        </header>

        <section class="section-card">
            <h3>💡 이용 가이드</h3>
            <p style="text-align: left; margin-bottom: 0;">
                라이프 헬퍼는 엄선된 20가지 대중적인 메뉴를 기반으로 최적의 선택을 돕습니다. 
                결과가 마음에 들지 않는다면 '다시 추천받기'를 눌러보세요.
            </p>
        </section>

        <section class="section-card">
            <h3>🤝 제휴 및 문의</h3>
            <form action="https://formspree.io/f/xykdowjz" method="POST" class="contact-form">
                <input type="email" id="email" name="email" placeholder="이메일 주소" required>
                <textarea id="message" name="message" rows="3" placeholder="문의 내용을 입력하세요." required></textarea>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>

    <footer class="site-footer">
        <p>&copy; 2026 Life Helper</p>
        <div class="footer-links">
            <a href="privacy.html">개인정보 처리방침</a>
