<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강아지 vs 고양이 판별기</title>
    <link rel="stylesheet" href="pet-classifier.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-1134948203088944">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1134948203088944"
     crossorigin="anonymous"></script>
    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="top-controls">
        <a href="index.html" class="control-btn">🏠 홈으로 돌아가기</a>
        <button id="theme-btn" class="control-btn">다크 모드 켜기</button>
    </div>

    <div class="app-container">
        <header>
            <h1>🐶 강아지 vs 고양이 AI 판별기 🐱</h1>
            <p>인공지능이 사진 속 동물이 강아지인지 고양이인지 분석해 드립니다!</p>
        </header>

        <main>
            <div class="media-section">
                <!-- 카메라 영역 -->
                <div id="webcam-container" class="media-container" style="display:none;">
                    <!-- 실시간 카메라 화면이 여기에 나타납니다 -->
                </div>
                
                <!-- 이미지 업로드 미리보기 영역 -->
                <div id="image-container" class="media-container">
                    <img id="upload-preview" src="" alt="이미지 미리보기" style="display:none;">
                    <div id="loading-message">여기에 사진을 끌어다 놓거나<br>아래 버튼을 눌러 시작해 보세요!</div>
                </div>
            </div>
            
            <div id="label-container">
                <!-- 판별 결과(확률)가 여기에 나타납니다 -->
            </div>

            <div class="button-group">
                <button id="start-btn" class="main-btn">🎥 실시간 카메라로 판별하기</button>
                <div class="upload-wrapper">
                    <label for="image-upload" class="main-btn secondary">🖼️ 내 사진 업로드해서 판별하기</label>
                    <input type="file" id="image-upload" accept="image/*" style="display:none;">
                </div>
                <button id="stop-camera-btn" class="main-btn danger" style="display:none;">카메라 끄고 멈추기</button>
            </div>
        </main>

        <section class="info-section">
            <h3>사용 안내</h3>
            <ul>
                <li><strong>실시간 판별:</strong> 카메라를 켜고 강아지나 고양이를 비춰보세요.</li>
                <li><strong>사진 업로드:</strong> 저장되어 있는 반려동물 사진을 선택하면 바로 분석합니다.</li>
                <li>인공지능 모델이 실시간으로 확률을 계산하여 결과를 보여줍니다.</li>
            </ul>
        </section>

        <footer>
            <p>&copy; 2026 AI Pet Classifier - 제품 빌더 강의 실습 | <a href="privacy.html" style="color: #bdc3c7; text-decoration: none;">개인정보 처리방침</a></p>
        </footer>
    </div>

    <script src="pet-classifier.js"></script>
</body>
</html>
